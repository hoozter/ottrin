name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev \
            fuse libfuse2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p ottrin-app

      - name: Package AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY=target/release/ottrin-app

          # AppDir skeleton
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp "$BINARY" AppDir/usr/bin/ottrin
          chmod +x AppDir/usr/bin/ottrin
          cp assets/icon.svg AppDir/usr/share/icons/hicolor/scalable/apps/ottrin.svg

          cat > AppDir/ottrin.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Ottrin
          Comment=Keyboard-first file manager
          Exec=ottrin
          Icon=ottrin
          Type=Application
          Categories=System;FileManager;
          Keywords=files;manager;miller;
          DESKTOP

          # AppRun — simple wrapper so FUSE mounts correctly
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/usr/bin/ottrin" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Also place desktop + icon at AppDir root (appimagetool requirement)
          cp AppDir/ottrin.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/scalable/apps/ottrin.svg AppDir/ottrin.svg

          # Download appimagetool
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          ARCH=x86_64 ./appimagetool AppDir "Ottrin-${VERSION}-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Ottrin-*.AppImage

  # ── macOS DMG ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build universal binary
        run: |
          cargo build --release -p ottrin-app --target aarch64-apple-darwin
          cargo build --release -p ottrin-app --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/ottrin-app \
            target/x86_64-apple-darwin/release/ottrin-app \
            -output ottrin-universal

      - name: Create .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "Ottrin.app/Contents/MacOS"
          mkdir -p "Ottrin.app/Contents/Resources"
          cp ottrin-universal "Ottrin.app/Contents/MacOS/Ottrin"
          chmod +x "Ottrin.app/Contents/MacOS/Ottrin"

          cat > "Ottrin.app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>     <string>Ottrin</string>
            <key>CFBundleIdentifier</key>     <string>com.hoozter.ottrin</string>
            <key>CFBundleName</key>           <string>Ottrin</string>
            <key>CFBundleDisplayName</key>    <string>Ottrin</string>
            <key>CFBundleVersion</key>        <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key>    <string>APPL</string>
            <key>LSMinimumSystemVersion</key> <string>12.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSHumanReadableCopyright</key><string>Copyright © 2026 hoozter. MIT License.</string>
          </dict>
          </plist>
          PLIST

          # Icon (SVG → icns via sips is lossy; placeholder until a proper .icns is committed)
          if [ -f assets/icon.svg ]; then
            mkdir -p icon.iconset
            for size in 16 32 64 128 256 512; do
              sips -z $size $size assets/icon.svg \
                --out icon.iconset/icon_${size}x${size}.png 2>/dev/null || true
            done
            iconutil -c icns icon.iconset -o Ottrin.app/Contents/Resources/AppIcon.icns 2>/dev/null || true
          fi

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          brew install create-dmg
          create-dmg \
            --volname "Ottrin ${VERSION}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Ottrin.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "Ottrin-${VERSION}.dmg" \
            "Ottrin.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Ottrin-*.dmg

  # ── Windows MSI ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset --yes
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build
        run: cargo build --release -p ottrin-app

      - name: Initialise WiX template (if not already committed)
        run: |
          if (-not (Test-Path "wix/main.wxs")) {
            cargo wix init --force --package ottrin-app
          }

      - name: Build MSI
        run: cargo wix --package ottrin-app --no-build --nocapture

      - name: Rename MSI to versioned filename
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Get-ChildItem target\wix\*.msi |
            Rename-Item -NewName "Ottrin-${version}-x64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target\wix\*.msi

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
